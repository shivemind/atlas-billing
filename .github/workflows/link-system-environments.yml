name: Link System Environments

on:
  workflow_dispatch:

jobs:
  link-environments:
    name: Link workspace envs to Production system env
    runs-on: ubuntu-latest
    steps:
      - name: Link environments via Bifrost
        shell: bash
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          SYSTEM_ENV_ID: "936898ce-cf73-4feb-827e-8a0e9d5e695e"
          TEAM_ID: "13569807"
        run: |
          which curl || (echo "curl not found" && exit 1)

          ENVS="55db4f35-9ac7-4f83-b06b-edccde48fc27 0c710169-0cbd-4a5b-86d3-544bc94a58bf bdb3cc97-1829-4c13-9f45-ef9af8512c40 742997bb-d2c1-47e8-b543-dcc97e4b9480 bbbb93e9-1d36-4db5-81f4-3da39a9f77d9 4f17a355-82b7-41d4-b0dc-0605abc9b8cf 81d23a78-1fda-40ff-9481-298fe8b8b268"
          NAMES="Atlas-Billing Atlas-Payments Atlas-Risk Atlas-Treasury Atlas-Platform EchoAtlas ChasingCats"

          ENV_JSON=""
          for UUID in $ENVS; do
            if [ -n "$ENV_JSON" ]; then ENV_JSON="$ENV_JSON,"; fi
            ENV_JSON="$ENV_JSON\"$UUID\""
          done

          echo "System Env: $SYSTEM_ENV_ID"
          echo "Environment UUIDs: $ENV_JSON"
          echo ""

          # Attempt batch approaches
          for METHOD in PUT POST PATCH; do
            for PATH_PREFIX in "/v1/system-environments" "/system-environments"; do
              FULL_PATH="$PATH_PREFIX/$SYSTEM_ENV_ID"
              for FIELD in environmentIds environments workspace_environment_ids; do
                echo "Trying: $METHOD $FULL_PATH ($FIELD)"
                RESP=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
                  "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
                  -H "Content-Type: application/json" \
                  -H "x-access-token: $ACCESS_TOKEN" \
                  -H "x-entity-team-id: $TEAM_ID" \
                  -d "{\"service\":\"api-catalog\",\"method\":\"$METHOD\",\"path\":\"$FULL_PATH\",\"body\":{\"$FIELD\":[$ENV_JSON]}}")
                echo "  HTTP $RESP: $(cat /tmp/resp.json)"
                if [ "$RESP" = "200" ] || [ "$RESP" = "201" ] || [ "$RESP" = "204" ]; then
                  echo "SUCCESS!"
                  exit 0
                fi
              done
            done
          done

          echo ""
          echo "=== Individual attempts ==="
          set +e
          ENV_ARR=($ENVS)
          NAME_ARR=($NAMES)
          for i in "${!ENV_ARR[@]}"; do
            UUID="${ENV_ARR[$i]}"
            NAME="${NAME_ARR[$i]}"
            echo ""
            echo "--- $NAME ($UUID) ---"
            for METHOD in PUT POST; do
              for PATH_PREFIX in "/v1/system-environments" "/system-environments"; do
                FULL_PATH="$PATH_PREFIX/$SYSTEM_ENV_ID/environments/$UUID"
                RESP=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
                  "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
                  -H "Content-Type: application/json" \
                  -H "x-access-token: $ACCESS_TOKEN" \
                  -H "x-entity-team-id: $TEAM_ID" \
                  -d "{\"service\":\"api-catalog\",\"method\":\"$METHOD\",\"path\":\"$FULL_PATH\",\"body\":{}}")
                echo "  $METHOD $FULL_PATH -> $RESP: $(cat /tmp/resp.json)"
                if [ "$RESP" = "200" ] || [ "$RESP" = "201" ] || [ "$RESP" = "204" ]; then
                  echo "  LINKED!"
                  break 2
                fi
              done
            done
          done

          echo ""
          echo "Note: If all attempts returned errors, the Bifrost API paths may differ."
          echo "Check the Postman UI network tab for the correct endpoint."