name: Postman Catalog Onboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  collection-run:
    name: Run API Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run Collection
        run: |
          postman collection run 52400725-04ebc6a6-e3e5-45cc-99f5-5b52f2ab0593 \
            -e 52400725-55db4f35-9ac7-4f83-b06b-edccde48fc27 \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Trigger Monitor Run
        run: |
          curl -sf -X POST "https://api.getpostman.com/monitors/52400725-1f11e43e-0c05-4820-af5e-9ab17849cc01/run" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}"

      - name: Summary
        if: always()
        run: |
          echo "### Postman Catalog Onboard - Atlas Billing" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: 52400725-04ebc6a6-e3e5-45cc-99f5-5b52f2ab0593" >> $GITHUB_STEP_SUMMARY
          echo "- **Monitor**: 52400725-1f11e43e-0c05-4820-af5e-9ab17849cc01" >> $GITHUB_STEP_SUMMARY
