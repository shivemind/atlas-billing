name: Publish to Postman Cloud

on:
  push:
    branches: [main]
    paths:
      - 'postman/**'
      - 'openapi/**'
      - '.postman/**'
  workflow_dispatch:

jobs:
  publish:
    name: Sync to Postman Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Push workspace to Postman Cloud
        run: postman workspace push -y

  test:
    name: Run API Tests
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          command: 'collection run 27c0a076-1a8c-4af6-8627-643a09528b3d -e 4f04e25b-6206-4dfe-8058-6670731a7f8e'
          api-key: ${{ secrets.POSTMAN_API_KEY }}
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### Postman API Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Collection: 27c0a076-1a8c-4af6-8627-643a09528b3d" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: 4f04e25b-6206-4dfe-8058-6670731a7f8e" >> $GITHUB_STEP_SUMMARY