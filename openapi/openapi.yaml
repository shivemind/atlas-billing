  /api/v1/invoices/{id}/pay:
    post:
      summary: Pay invoice
      description: >
        Attempts to pay an open or past-due invoice using the deterministic mock processor. Amount divisible by 10 →
        paid; divisible by 5 (not 10) → uncollectible; else stays current status.
      x-platform:
        kind: transition
        entity: Invoice
        stateChanges:
          - open -> paid
          - open -> uncollectible
          - past_due -> paid
          - past_due -> uncollectible
        emitsEvents:
          - invoice.paid
          - invoice.uncollectible
          - invoice.payment_failed
        affectsLedger: false
      operationId: payInvoice
      tags:
        - Invoices
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Payment attempt processed.
          content:
            application/json:
              schema:
                type: object
                required:
