openapi: 3.1.0
info:
  title: Atlas Billing API
  version: 0.2.0
  description: Subscription billing — products, prices, coupons, subscriptions, invoices, and credit notes
  contact:
    name: AtlasPayments Team
    url: https://github.com/shivemind/atlaspayments
servers:
  - url: http://localhost:3002
    description: Local billing service. Override via Postman {{baseUrl}} environment variable.
tags:
  - name: Products
    description: Product catalog management
  - name: Prices
    description: Price configuration for products
  - name: Coupons
    description: Coupon and discount management
  - name: PromoCodes
    description: Promotion code management
  - name: TaxRates
    description: Tax rate configuration
  - name: Subscriptions
    description: Subscription lifecycle management
  - name: Invoices
    description: Invoice lifecycle and payment collection
  - name: InvoiceItems
    description: Invoice line item management
  - name: CreditNotes
    description: Credit note issuance and application to invoices
paths:
  /api/v1/products:
    get:
      summary: List products
      description: Returns a paginated list of products for the authenticated merchant.
      x-platform:
        kind: resource
        entity: Product
        affectsLedger: false
      operationId: listProducts
      tags:
        - Products
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - in: query
          name: status
          description: Filter by product status (active or archived).
          schema:
            type: string
            enum:
              - active
              - archived
      responses:
        "200":
          description: Paginated list of merchant products.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create product
      description: Creates a new product in the merchant's catalog.
      x-platform:
        kind: resource
        entity: Product
        emitsEvents:
          - product.created
        affectsLedger: false
      operationId: createProduct
      tags:
        - Products
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: Product display name.
                description:
                  type: string
                  maxLength: 2000
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              basic:
                value:
                  name: Premium Plan
                  description: Access to all premium features
                  metadata:
                    tier: premium
      responses:
        "201":
          description: Product created successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - product
                properties:
                  product:
                    type: object
              examples:
                created:
                  value:
                    product:
                      id: prod_abc123
                      merchant_id: cmf1merchant123
                      name: Premium Plan
                      description: Access to all premium features
                      status: active
                      metadata:
                        tier: premium
                      created_at: 2026-03-01T10:00:00.000Z
                      updated_at: 2026-03-01T10:00:00.000Z
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/products/{id}:
    get:
      summary: Get product by ID
      description: Returns a single product scoped to the authenticated merchant.
      x-platform:
        kind: resource
        entity: Product
        affectsLedger: false
      operationId: getProductById
      tags:
        - Products
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Product found.
          content:
            application/json:
              schema:
                type: object
                required:
                  - product
                properties:
                  product:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update product
      description: Updates a product's name, description, or metadata. Cannot update archived products.
      x-platform:
        kind: transition
        entity: Product
        emitsEvents:
          - product.updated
        affectsLedger: false
        stateChanges:
          - metadata_updated
      operationId: updateProduct
      tags:
        - Products
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  maxLength: 2000
                  nullable: true
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Product updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - product
                properties:
                  product:
                    type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Product is archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Archive product
      description: Archives a product (soft delete). Archived products cannot be updated.
      x-platform:
        kind: transition
        entity: Product
        stateChanges:
          - active -> archived
        emitsEvents:
          - product.archived
        affectsLedger: false
      operationId: archiveProduct
      tags:
        - Products
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Product archived.
          content:
            application/json:
              schema:
                type: object
                required:
                  - product
                properties:
                  product:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Product is already archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/products/{id}/prices:
    get:
      summary: List prices for product
      description: Returns a paginated list of prices associated with a specific product.
      x-platform:
        kind: resource
        entity: Price
        affectsLedger: false
      operationId: listProductPrices
      tags:
        - Products
        - Prices
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of prices for the product.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/prices:
    get:
      summary: List prices
      description: Returns a paginated list of prices with optional product, type, and active filters.
      x-platform:
        kind: resource
        entity: Price
        affectsLedger: false
      operationId: listPrices
      tags:
        - Prices
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - in: query
          name: product_id
          description: Filter prices by product ID.
          schema:
            type: string
        - in: query
          name: active
          description: Filter by active status.
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - in: query
          name: type
          description: Filter by price type.
          schema:
            type: string
            enum:
              - one_time
              - recurring
      responses:
        "200":
          description: Paginated list of prices.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create price
      description: >
        Creates a price for a product. Recurring prices require billing_interval. Cannot create prices for archived
        products.
      x-platform:
        kind: resource
        entity: Price
        emitsEvents:
          - price.created
        affectsLedger: false
        workflowRefs:
          - subscription_lifecycle
      operationId: createPrice
      tags:
        - Prices
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - currency
                - unit_amount
              properties:
                product_id:
                  type: string
                  description: ID of the product this price belongs to.
                nickname:
                  type: string
                  maxLength: 200
                type:
                  type: string
                  enum:
                    - one_time
                    - recurring
                  default: one_time
                currency:
                  type: string
                  minLength: 3
                  maxLength: 3
                unit_amount:
                  type: integer
                  minimum: 1
                  description: Price in smallest currency unit (e.g. cents).
                billing_interval:
                  type: string
                  enum:
                    - day
                    - week
                    - month
                    - year
                  description: Required for recurring prices.
                interval_count:
                  type: integer
                  minimum: 1
                  default: 1
                trial_days:
                  type: integer
                  minimum: 0
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              monthly:
                value:
                  product_id: prod_abc123
                  nickname: Monthly
                  type: recurring
                  currency: usd
                  unit_amount: 2999
                  billing_interval: month
                  interval_count: 1
      responses:
        "201":
          description: Price created successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - price
                properties:
                  price:
                    type: object
        "400":
          description: Invalid request payload or product is archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/prices/{id}:
    get:
      summary: Get price by ID
      description: Returns a single price scoped to the authenticated merchant.
      x-platform:
        kind: resource
        entity: Price
        affectsLedger: false
      operationId: getPriceById
      tags:
        - Prices
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Price found.
          content:
            application/json:
              schema:
                type: object
                required:
                  - price
                properties:
                  price:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Price not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update price
      description: Updates a price's nickname, active status, or metadata.
      x-platform:
        kind: transition
        entity: Price
        emitsEvents:
          - price.updated
        affectsLedger: false
        stateChanges:
          - metadata_updated
      operationId: updatePrice
      tags:
        - Prices
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  maxLength: 200
                  nullable: true
                is_active:
                  type: boolean
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Price updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - price
                properties:
                  price:
                    type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Price not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/coupons:
    get:
      summary: List coupons
      description: Returns a paginated list of coupons for the authenticated merchant.
      x-platform:
        kind: resource
        entity: Coupon
        affectsLedger: false
      operationId: listCoupons
      tags:
        - Coupons
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of coupons.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create coupon
      description: >
        Creates a coupon with either a fixed amount or percentage discount. Exactly one of amount_off or percent_off
        must be provided.
      x-platform:
        kind: resource
        entity: Coupon
        emitsEvents:
          - coupon.created
        affectsLedger: false
      operationId: createCoupon
      tags:
        - Coupons
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                amount_off:
                  type: integer
                  minimum: 1
                  description: Fixed discount in smallest currency unit. Mutually exclusive with percent_off.
                percent_off:
                  type: number
                  minimum: 0.01
                  maximum: 100
                  description: Percentage discount. Mutually exclusive with amount_off.
                currency:
                  type: string
                  minLength: 3
                  maxLength: 3
                  description: Required when amount_off is set.
                duration:
                  type: string
                  enum:
                    - once
                    - repeating
                    - forever
                  default: once
                duration_in_months:
                  type: integer
                  minimum: 1
                  description: Required when duration is repeating.
                max_redemptions:
                  type: integer
                  minimum: 1
                redeem_by:
                  type: string
                  format: date-time
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              percent:
                value:
                  name: Summer Sale
                  percent_off: 20
                  duration: once
      responses:
        "201":
          description: Coupon created successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - coupon
                properties:
                  coupon:
                    type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/coupons/{id}:
    get:
      summary: Get coupon by ID
      description: Returns a single coupon scoped to the authenticated merchant.
      x-platform:
        kind: resource
        entity: Coupon
        affectsLedger: false
      operationId: getCouponById
      tags:
        - Coupons
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Coupon found.
          content:
            application/json:
              schema:
                type: object
                required:
                  - coupon
                properties:
                  coupon:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Coupon not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update coupon
      description: Updates a coupon's name or metadata. Cannot update inactive coupons.
      x-platform:
        kind: transition
        entity: Coupon
        emitsEvents:
          - coupon.updated
        affectsLedger: false
        stateChanges:
          - active -> inactive
          - metadata_updated
      operationId: updateCoupon
      tags:
        - Coupons
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Coupon updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - coupon
                properties:
                  coupon:
                    type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Coupon not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Coupon is inactive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Deactivate coupon
      description: Deactivates a coupon (soft delete). Inactive coupons cannot be updated.
      x-platform:
        kind: transition
        entity: Coupon
        stateChanges:
          - active -> inactive
        emitsEvents:
          - coupon.deactivated
        affectsLedger: false
      operationId: deactivateCoupon
      tags:
        - Coupons
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Coupon deactivated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - coupon
                properties:
                  coupon:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Coupon not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Coupon is already inactive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/promotion_codes:
    get:
      summary: List promotion codes
      description: Returns a paginated list of promotion codes with optional coupon and active filters.
      x-platform:
        kind: resource
        entity: PromotionCode
        affectsLedger: false
      operationId: listPromotionCodes
      tags:
        - PromoCodes
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - in: query
          name: coupon_id
          description: Filter by coupon ID.
          schema:
            type: string
        - in: query
          name: active
          description: Filter by active status.
          schema:
            type: string
            enum:
              - "true"
              - "false"
      responses:
        "200":
          description: Paginated list of promotion codes.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create promotion code
      description: Creates a promotion code linked to an active coupon. Code must be unique per merchant.
      x-platform:
        kind: resource
        entity: PromotionCode
        emitsEvents:
          - promotion_code.created
        affectsLedger: false
      operationId: createPromotionCode
      tags:
        - PromoCodes
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - coupon_id
                - code
              properties:
                coupon_id:
                  type: string
                  description: ID of the coupon this promotion code references.
                code:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Unique code string per merchant.
                max_redemptions:
                  type: integer
                  minimum: 1
                expires_at:
                  type: string
                  format: date-time
                restrictions:
                  type: object
                  additionalProperties: true
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              basic:
                value:
                  coupon_id: cpn_abc123
                  code: SUMMER2026
                  max_redemptions: 100
      responses:
        "201":
          description: Promotion code created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - promotion_code
                properties:
                  promotion_code:
                    type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Coupon not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Code already exists or coupon is inactive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/promotion_codes/{id}:
    get:
      summary: Get promotion code by ID
      description: Returns a single promotion code scoped to the authenticated merchant.
      x-platform:
        kind: resource
        entity: PromotionCode
        affectsLedger: false
      operationId: getPromotionCodeById
      tags:
        - PromoCodes
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Promotion code found.
          content:
            application/json:
              schema:
                type: object
                required:
                  - promotion_code
                properties:
                  promotion_code:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
