      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Invoice voided.
          content:
            application/json:
              schema:
                type: object
                required:
                  - invoice
                properties:
                  invoice:
                    $ref: "#/components/schemas/Invoice"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invalid state transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/invoices/{id}/items:
    get:
      summary: List invoice items
      description: Returns paginated items for an invoice.
      x-platform:
        kind: resource
        entity: InvoiceItem
        affectsLedger: false
      operationId: listInvoiceItems
      tags:
        - InvoiceItems
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated invoice items.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InvoiceItem"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Add invoice item
      description: Adds a line item to a draft invoice and recalculates totals.
      x-platform:
        kind: resource
        entity: InvoiceItem
        emitsEvents:
          - invoice.updated
        affectsLedger: false
      operationId: addInvoiceItem
      tags:
        - InvoiceItems
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
                - unit_amount
                - currency
              properties:
                description:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
                  default: 1
                unit_amount:
                  type: integer
                  minimum: 0
                currency:
                  type: string
                  minLength: 3
                  maxLength: 3
                price_id:
                  type: string
                metadata:
                  type: object
      responses:
        "201":
          description: Item added.
          content:
            application/json:
              schema:
                type: object
                required:
                  - invoice_item
                properties:
                  invoice_item:
                    $ref: "#/components/schemas/InvoiceItem"
        "400":
          description: Invoice is not in draft status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/invoices/{id}/items/{itemId}:
    get:
      summary: Get invoice item
      description: Retrieves a single invoice item.
      x-platform:
        kind: resource
        entity: InvoiceItem
        affectsLedger: false
      operationId: getInvoiceItem
      tags:
        - InvoiceItems
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - in: path
          name: itemId
          required: true
          schema:
            type: string
          description: Invoice item ID.
      responses:
        "200":
          description: Invoice item details.
          content:
            application/json:
              schema:
                type: object
                required:
                  - invoice_item
                properties:
                  invoice_item:
                    $ref: "#/components/schemas/InvoiceItem"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update invoice item
      description: Updates an invoice item on a draft invoice and recalculates totals.
      x-platform:
        kind: resource
        entity: InvoiceItem
        emitsEvents:
          - invoice.updated
        affectsLedger: false
      operationId: updateInvoiceItem
      tags:
        - InvoiceItems
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - in: path
          name: itemId
          required: true
          schema:
            type: string
          description: Invoice item ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
                unit_amount:
                  type: integer
                  minimum: 0
                metadata:
                  type: object
      responses:
        "200":
          description: Item updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - invoice_item
                properties:
                  invoice_item:
                    $ref: "#/components/schemas/InvoiceItem"
        "400":
          description: Invoice is not in draft status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete invoice item
      description: Removes an invoice item from a draft invoice and recalculates totals.
      x-platform:
        kind: transition
        entity: InvoiceItem
        emitsEvents:
          - invoice.updated
        affectsLedger: false
        stateChanges:
          - item_removed
      operationId: deleteInvoiceItem
      tags:
        - InvoiceItems
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - in: path
          name: itemId
          required: true
          schema:
            type: string
          description: Invoice item ID.
      responses:
        "200":
          description: Item removed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                properties:
                  deleted:
                    type: boolean
        "400":
          description: Invoice is not in draft status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/invoices/{id}/attempts:
    get:
      summary: List invoice payment attempts
      description: Returns paginated payment attempts for an invoice.
      x-platform:
        kind: resource
        entity: InvoiceAttempt
        affectsLedger: false
      operationId: listInvoiceAttempts
      tags:
        - Invoices
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated invoice attempts.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InvoiceAttempt"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/customers/{id}/invoices:
    get:
      summary: List customer invoices
      description: Returns paginated invoices for a specific customer.
      x-platform:
        kind: resource
        entity: Invoice
        affectsLedger: false
      operationId: listCustomerInvoices
      tags:
        - Invoices
        - Customers
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - in: query
          name: status
          schema:
            type: string
            enum:
              - draft
              - open
              - paid
              - void
              - uncollectible
              - past_due
          description: Filter by invoice status.
      responses:
        "200":
          description: Paginated list of customer invoices.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invoice"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    MerchantKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Bearer API key for merchant-scoped operations. Pass as `Authorization: Bearer {{merchantApiKey}}`.
    PlatformAdminKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Bearer API key for platform admin operations. Pass as `Authorization: Bearer {{platformAdminKey}}`.
  schemas:
    ErrorResponse:
      description: Standard error response envelope returned for 4xx/5xx responses.
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code.
            message:
              type: string
              description: Human-readable error description.
    PaginationMeta:
      description: Pagination metadata included in list responses.
      type: object
      required:
        - page
        - pageSize
        - total
        - hasMore
      properties:
        page:
          type: integer
          description: Current page number (1-indexed).
        pageSize:
          type: integer
          description: Number of results per page.
        total:
          type: integer
          description: Total number of matching records.
        hasMore:
          type: boolean
          description: Whether additional pages exist.
    CreditNote:
      description: A credit note issued against an invoice.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        invoice_id:
          type: string
        number:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - issued
            - void
        reason:
          type: string
          nullable: true
        amount:
          type: integer
        currency:
          type: string
        voided_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreditNoteLineItem:
      description: A line item on a credit note.
      type: object
      properties:
        id:
          type: string
        credit_note_id:
          type: string
        description:
          type: string
        quantity:
          type: integer
        unit_amount:
          type: integer
        amount:
          type: integer
        created_at:
          type: string
          format: date-time
    Event:
      description: A domain event representing a state change in the system.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        type:
          type: string
          description: Event type (e.g. payment_intent.succeeded).
        entity_type:
          type: string
          description: Type of entity that triggered the event.
        entity_id:
          type: string
          description: ID of the entity that triggered the event.
        payload:
          type: object
          description: Event payload with entity snapshot.
        actor_type:
          type: string
          nullable: true
        actor_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    WebhookEndpoint:
      description: A registered webhook endpoint for receiving event notifications.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        url:
          type: string
          format: uri
        is_active:
          type: boolean
        enabled_events:
          type: array
          items:
            type: string
        secret:
          type: string
          description: Only included on creation and rotate.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WebhookDelivery:
      description: A webhook delivery record with attempt history.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        webhook_endpoint_id:
          type: string
        event_type:
          type: string
        payload:
          type: object
        status:
          type: string
          enum:
            - PENDING
            - DELIVERED
            - FAILED
        delivered_at:
          type: string
          format: date-time
          nullable: true
        next_attempt_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        attempts:
          type: array
          items:
            type: object
            properties:
              attempt_number:
                type: integer
              response_status:
                type: integer
                nullable: true
              created_at:
                type: string
                format: date-time
              completed_at:
                type: string
                format: date-time
                nullable: true
    Adjustment:
      description: A credit or debit adjustment.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        type:
          type: string
          enum:
            - credit
            - debit
        amount:
          type: integer
        currency:
          type: string
        description:
          type: string
          nullable: true
        reference:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Dispute:
      description: A payment dispute.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        payment_intent_id:
          type: string
        status:
          type: string
          enum:
            - needs_response
            - under_review
            - won
            - lost
            - accepted
            - expired
        reason:
          type: string
          enum:
            - fraudulent
            - duplicate
            - not_received
            - product_unacceptable
            - subscription_canceled
            - other
        amount:
          type: integer
        currency:
          type: string
        due_by:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DisputeEvidence:
      description: A piece of evidence for a dispute.
      type: object
      properties:
        id:
          type: string
        dispute_id:
          type: string
        type:
          type: string
          enum:
            - receipt
            - shipping_proof
            - customer_communication
            - service_documentation
            - policy_disclosure
            - other
        file_name:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Representment:
      description: A dispute representment.
      type: object
      properties:
        id:
          type: string
        dispute_id:
          type: string
        submitted_at:
          type: string
          format: date-time
          nullable: true
        outcome:
          type: string
          nullable: true
        details:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OnboardingProfile:
      description: Merchant onboarding / KYB profile.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        business_name:
          type: string
          nullable: true
        business_type:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - started
            - submitted
            - under_review
            - approved
            - denied
            - withdrawn
        submitted_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Owner:
      description: Beneficial owner attached to an onboarding profile.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          nullable: true
        ownership_percentage:
          type: integer
          nullable: true
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OnboardingDocument:
      description: Document record for KYB verification.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        type:
          type: string
          enum:
            - government_id
            - proof_of_address
            - bank_statement
            - tax_return
            - articles_of_incorporation
            - other
        status:
          type: string
          enum:
            - pending
            - verified
            - rejected
        file_name:
          type: string
        file_size:
          type: integer
          nullable: true
        mime_type:
          type: string
          nullable: true
        review_note:
          type: string
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OnboardingBankAccount:
      description: Bank account attached to an onboarding profile.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        bank_name:
          type: string
        account_holder_name:
          type: string
        routing_number:
          type: string
        account_number_last4:
          type: string
        account_type:
          type: string
          enum:
            - checking
            - savings
        is_verified:
          type: boolean
        is_primary:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UnderwritingCase:
      description: Underwriting review case linked to an onboarding profile.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        assigned_to:
          type: string
          nullable: true
        risk_score:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UnderwritingDecision:
      description: Decision recorded against an underwriting case.
      type: object
      properties:
        id:
          type: string
        underwriting_case_id:
          type: string
        result:
          type: string
          enum:
            - approved
            - denied
            - escalated
            - pending_info
        reason:
          type: string
          nullable: true
        decided_by:
          type: string
          nullable: true
        decided_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Subscription:
      description: A recurring billing subscription.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        customer_id:
          type: string
        status:
          type: string
          enum:
            - incomplete
            - incomplete_expired
            - trialing
            - active
            - past_due
            - paused
            - canceled
            - unpaid
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
        canceled_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
        trial_start:
          type: string
          format: date-time
          nullable: true
        trial_end:
          type: string
          format: date-time
          nullable: true
        default_payment_method:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionItem"
    SubscriptionItem:
      description: A line item on a subscription linking a price.
      type: object
      properties:
        id:
          type: string
        subscription_id:
          type: string
        price_id:
          type: string
        quantity:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Invoice:
      description: An invoice representing an amount owed by a customer.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        customer_id:
          type: string
        subscription_id:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - draft
            - open
            - paid
            - void
            - uncollectible
            - past_due
        currency:
          type: string
        subtotal:
          type: integer
        tax:
          type: integer
        total:
          type: integer
        amount_paid:
          type: integer
        amount_due:
          type: integer
        due_date:
          type: string
          format: date-time
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        voided_at:
          type: string
          format: date-time
          nullable: true
        period_start:
          type: string
          format: date-time
          nullable: true
        period_end:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
    InvoiceItem:
      description: A line item on an invoice.
      type: object
      properties:
        id:
          type: string
        invoice_id:
          type: string
        description:
          type: string
        quantity:
          type: integer
        unit_amount:
          type: integer
        amount:
          type: integer
        currency:
          type: string
